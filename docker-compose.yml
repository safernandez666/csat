version: '3.8'

services:
  backend:
    build: ./backend
    container_name: csat-backend
    restart: unless-stopped
    environment:
      - CSAT_ENV=${CSAT_ENV:-dev}
      - DATABASE_URL=sqlite:////app/data/csat.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=http://localhost
      - UPLOAD_DIR=./uploads
      - SCHEDULER_ENABLED=true
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - AI_DEFAULT_URL=${AI_DEFAULT_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - csat-data:/app/data
      - csat-uploads:/app/uploads
    networks:
      - csat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: csat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - csat-network

  # Optional: Keycloak as the SSO IdP for development and demos.
  # Start it with the `sso` profile:   docker compose --profile sso up -d
  # Skip it entirely for plain CSAT:   docker compose up -d
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: csat-keycloak
    restart: unless-stopped
    profiles: ["sso"]
    command: ["start-dev"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN:-admin}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_HTTP_ENABLED=true
      # Public URL the browser uses. host.docker.internal works out of the box
      # on Docker Desktop (mac/win) and on Linux thanks to the extra_hosts entry.
      - KC_HOSTNAME=${KEYCLOAK_PUBLIC_URL:-http://host.docker.internal:8081}
      - KC_HOSTNAME_STRICT=false
      - KC_HEALTH_ENABLED=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8080"
    volumes:
      - csat-keycloak-data:/opt/keycloak/data
    networks:
      - csat-network

volumes:
  csat-data:
  csat-uploads:
  csat-keycloak-data:

networks:
  csat-network:
    driver: bridge
